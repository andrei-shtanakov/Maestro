<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --pending: #6b7280;
            --ready: #06b6d4;
            --running: #f59e0b;
            --done: #22c55e;
            --failed: #ef4444;
            --review: #ef4444;
            --approval: #a855f7;
            --abandoned: #9ca3af;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 { font-size: 18px; font-weight: 600; }
        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-dim);
        }
        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--failed);
        }
        .connection-dot.connected { background: var(--done); }
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            grid-template-rows: 1fr;
            height: calc(100vh - 49px);
        }
        .dag-panel {
            padding: 16px;
            overflow: auto;
            display: flex;
            flex-direction: column;
        }
        .dag-container {
            flex: 1;
            background: var(--surface);
            border-radius: 8px;
            border: 1px solid var(--border);
            padding: 16px;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dag-container svg { max-width: 100%; height: auto; }
        .sidebar {
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .summary-bar {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-badge .count {
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            padding: 0 4px;
            margin-left: 2px;
        }
        .task-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .task-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color 0.15s;
        }
        .task-card:hover { border-color: var(--text-dim); }
        .task-card.selected { border-color: var(--ready); }
        .task-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6px;
        }
        .task-id {
            font-size: 12px;
            font-weight: 600;
            font-family: monospace;
        }
        .task-status {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 1px 6px;
            border-radius: 3px;
            color: white;
        }
        .task-title {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 4px;
        }
        .task-meta {
            font-size: 11px;
            color: var(--text-dim);
        }
        .task-actions {
            margin-top: 8px;
            display: flex;
            gap: 6px;
        }
        .btn {
            padding: 4px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--surface);
            color: var(--text);
            font-size: 11px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn:hover { background: var(--border); }
        .btn-retry {
            border-color: var(--running);
            color: var(--running);
        }
        .btn-retry:hover { background: rgba(245, 158, 11, 0.15); }
        .btn-retry:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .log-panel {
            border-top: 1px solid var(--border);
            height: 250px;
            display: flex;
            flex-direction: column;
        }
        .log-panel-header {
            padding: 8px 12px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
            font-size: 11px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--text-dim);
            background: #0b1120;
        }
        .log-content .empty {
            color: var(--text-dim);
            font-style: italic;
            padding: 16px 0;
            text-align: center;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .status-running { animation: pulse 2s infinite; }
    </style>
</head>
<body>
    <header>
        <h1>Maestro Dashboard</h1>
        <div class="connection-status">
            <div class="connection-dot" id="connDot"></div>
            <span id="connText">Connecting...</span>
        </div>
    </header>

    <div class="main-layout">
        <div class="dag-panel">
            <div class="dag-container" id="dagContainer">
                <div style="color: var(--text-dim)">Loading DAG...</div>
            </div>
        </div>

        <div class="sidebar">
            <div class="summary-bar" id="summaryBar"></div>
            <div class="task-list" id="taskList"></div>
            <div class="log-panel">
                <div class="log-panel-header">
                    <span id="logTitle">Logs</span>
                    <button class="btn" id="refreshLogBtn" style="display:none"
                            onclick="loadLogs()">Refresh</button>
                </div>
                <div class="log-content" id="logContent">
                    <div class="empty">Select a task to view logs</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let tasks = [];
        let statusColors = {};
        let selectedTaskId = null;
        let eventSource = null;

        // Mermaid config
        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            themeVariables: {
                darkMode: true,
                background: '#1e293b',
                primaryColor: '#334155',
                primaryTextColor: '#e2e8f0',
                lineColor: '#64748b',
                fontSize: '13px',
            },
            flowchart: {
                htmlLabels: true,
                curve: 'basis',
                padding: 12,
                nodeSpacing: 40,
                rankSpacing: 50,
            },
        });

        // Color map for mermaid styles
        const mermaidColors = {
            pending: { fill: '#374151', stroke: '#6b7280' },
            ready: { fill: '#164e63', stroke: '#06b6d4' },
            awaiting_approval: { fill: '#581c87', stroke: '#a855f7' },
            running: { fill: '#78350f', stroke: '#f59e0b' },
            validating: { fill: '#78350f', stroke: '#f59e0b' },
            done: { fill: '#14532d', stroke: '#22c55e' },
            failed: { fill: '#7f1d1d', stroke: '#ef4444' },
            needs_review: { fill: '#7f1d1d', stroke: '#ef4444' },
            abandoned: { fill: '#1f2937', stroke: '#9ca3af' },
        };

        function buildMermaidDef(tasks) {
            let lines = ['graph TD'];
            const ids = new Set(tasks.map(t => t.id));

            // Sanitize ID for mermaid (replace hyphens with underscores)
            const mid = id => id.replace(/-/g, '_');

            // Add nodes
            for (const t of tasks) {
                const label = `${t.id}\\n${t.status.toUpperCase()}`;
                lines.push(`    ${mid(t.id)}["${label}"]`);
            }

            // Add edges
            for (const t of tasks) {
                for (const dep of t.depends_on) {
                    if (ids.has(dep)) {
                        lines.push(`    ${mid(dep)} --> ${mid(t.id)}`);
                    }
                }
            }

            // Add styles
            for (const t of tasks) {
                const c = mermaidColors[t.status] || mermaidColors.pending;
                lines.push(
                    `    style ${mid(t.id)} fill:${c.fill},stroke:${c.stroke},stroke-width:2px,color:#e2e8f0`
                );
            }

            return lines.join('\n');
        }

        async function renderDag() {
            if (tasks.length === 0) {
                document.getElementById('dagContainer').innerHTML =
                    '<div style="color: var(--text-dim)">No tasks loaded</div>';
                return;
            }

            const def = buildMermaidDef(tasks);
            try {
                const { svg } = await mermaid.render('dagGraph', def);
                document.getElementById('dagContainer').innerHTML = svg;
            } catch (e) {
                console.error('Mermaid render error:', e);
                document.getElementById('dagContainer').innerHTML =
                    '<div style="color: var(--failed)">Error rendering DAG</div>';
            }
        }

        function statusBg(status) {
            return statusColors[status] || '#6b7280';
        }

        function renderSummary() {
            const counts = {};
            for (const t of tasks) {
                counts[t.status] = (counts[t.status] || 0) + 1;
            }
            const bar = document.getElementById('summaryBar');
            bar.innerHTML = '';
            const order = [
                'done', 'running', 'validating', 'ready',
                'pending', 'failed', 'needs_review',
                'awaiting_approval', 'abandoned'
            ];
            for (const s of order) {
                if (!counts[s]) continue;
                const badge = document.createElement('span');
                badge.className = 'status-badge';
                badge.style.background = statusBg(s) + '22';
                badge.style.color = statusBg(s);
                badge.style.border = `1px solid ${statusBg(s)}44`;
                badge.innerHTML = `${s.replace('_', ' ')} <span class="count">${counts[s]}</span>`;
                bar.appendChild(badge);
            }
        }

        function renderTaskList() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            for (const t of tasks) {
                const card = document.createElement('div');
                card.className = 'task-card' + (t.id === selectedTaskId ? ' selected' : '');
                card.onclick = () => selectTask(t.id);

                const canRetry = t.status === 'failed' || t.status === 'needs_review';
                const statusClass = t.status === 'running' ? ' status-running' : '';

                card.innerHTML = `
                    <div class="task-card-header">
                        <span class="task-id">${t.id}</span>
                        <span class="task-status${statusClass}"
                              style="background:${statusBg(t.status)}">${t.status.replace('_', ' ')}</span>
                    </div>
                    <div class="task-title">${t.title}</div>
                    <div class="task-meta">
                        ${t.agent_type} | retries: ${t.retry_count}/${t.max_retries}
                        ${t.error_message ? '<br><span style="color:var(--failed)">' + truncate(t.error_message, 80) + '</span>' : ''}
                        ${t.result_summary ? '<br><span style="color:var(--done)">' + truncate(t.result_summary, 80) + '</span>' : ''}
                    </div>
                    <div class="task-actions">
                        <button class="btn btn-retry" ${canRetry ? '' : 'disabled'}
                                onclick="event.stopPropagation(); retryTask('${t.id}')">Retry</button>
                        <button class="btn" onclick="event.stopPropagation(); selectTask('${t.id}'); loadLogs()">View Logs</button>
                    </div>
                `;
                list.appendChild(card);
            }
        }

        function truncate(str, max) {
            if (!str) return '';
            const escaped = str.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return escaped.length > max ? escaped.slice(0, max) + '...' : escaped;
        }

        function selectTask(taskId) {
            selectedTaskId = taskId;
            renderTaskList();
            loadLogs();
        }

        async function retryTask(taskId) {
            try {
                const res = await fetch(`/api/tasks/${taskId}/retry`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                });
                const data = await res.json();
                if (!data.success) {
                    alert('Retry failed: ' + data.message);
                }
            } catch (e) {
                alert('Retry error: ' + e.message);
            }
        }

        async function loadLogs() {
            const title = document.getElementById('logTitle');
            const content = document.getElementById('logContent');
            const btn = document.getElementById('refreshLogBtn');

            if (!selectedTaskId) {
                title.textContent = 'Logs';
                content.innerHTML = '<div class="empty">Select a task to view logs</div>';
                btn.style.display = 'none';
                return;
            }

            title.textContent = `Logs: ${selectedTaskId}`;
            btn.style.display = 'inline-block';

            try {
                const res = await fetch(`/api/tasks/${selectedTaskId}/logs?tail=200`);
                const data = await res.json();

                if (!data.available || data.lines.length === 0) {
                    content.innerHTML = '<div class="empty">No logs available</div>';
                } else {
                    content.textContent = data.lines.join('\n');
                    content.scrollTop = content.scrollHeight;
                }
            } catch (e) {
                content.innerHTML = '<div class="empty">Error loading logs</div>';
            }
        }

        // Initial load
        async function init() {
            try {
                const res = await fetch('/api/dag');
                const data = await res.json();
                tasks = data.tasks;
                statusColors = data.status_colors;
                renderSummary();
                renderTaskList();
                await renderDag();
            } catch (e) {
                console.error('Init error:', e);
            }

            connectSSE();
        }

        function connectSSE() {
            const dot = document.getElementById('connDot');
            const text = document.getElementById('connText');

            if (eventSource) {
                eventSource.close();
            }

            eventSource = new EventSource('/api/tasks/stream');

            eventSource.onopen = () => {
                dot.classList.add('connected');
                text.textContent = 'Connected';
            };

            eventSource.onmessage = async (event) => {
                try {
                    const updated = JSON.parse(event.data);
                    tasks = updated;
                    renderSummary();
                    renderTaskList();
                    await renderDag();
                } catch (e) {
                    console.error('SSE parse error:', e);
                }
            };

            eventSource.onerror = () => {
                dot.classList.remove('connected');
                text.textContent = 'Reconnecting...';
                // EventSource auto-reconnects
            };
        }

        init();
    </script>
</body>
</html>
